name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v6

      - name: Toolchain information
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks
          df -h .

      - name: Install build prerequisites
        run: |
          brew install asn1c autoconf automake libtool gnu-sed wget ninja xcodegen jq
          python3 -m pip install --user --break-system-packages lxml

      - name: Install upstream-compatible Zig
        run: |
          zig_version=0.15.2
          zig_archive="zig-aarch64-macos-${zig_version}.tar.xz"
          zig_root="$PWD/zig-aarch64-macos-${zig_version}"
          zig_url="https://ziglang.org/download/${zig_version}/${zig_archive}"
          expected=$(curl -fsSL https://ziglang.org/download/index.json | jq -r ".\"${zig_version}\".\"aarch64-macos\".shasum")
          curl -fsSLO "$zig_url"
          echo "${expected}  ${zig_archive}" | shasum -a 256 -c -
          tar -xf "$zig_archive"
          macos_major=$(sw_vers -productVersion | cut -d. -f1)
          macos_sdk=$(xcrun --sdk macosx --show-sdk-path)
          cp "$macos_sdk/usr/lib/libSystem.tbd" \
            "$zig_root/lib/libc/darwin/libSystem.${macos_major}.tbd"
          echo "$zig_root" >> "$GITHUB_PATH"

      - name: Cache Rust build tools
        id: cargo-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-capi
            ~/.cargo/bin/cargo-cbuild
            ~/.cargo/bin/cargo-cinstall
            ~/.cargo/bin/cargo-ctest
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-c-${{ runner.os }}-${{ runner.arch }}-0.10.24

      - name: Install cargo-c
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-c

      - name: Save Rust build tools
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/cargo-capi
            ~/.cargo/bin/cargo-cbuild
            ~/.cargo/bin/cargo-cinstall
            ~/.cargo/bin/cargo-ctest
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-c-${{ runner.os }}-${{ runner.arch }}-0.10.24

      - name: Clone pinned upstream sources and apply compatibility patches
        run: scripts/bootstrap.sh

      - name: Build dependencies and application
        run: scripts/build.sh

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: pEp-iOS16-unsigned
          path: artifacts/pEp-iOS16-unsigned.ipa
          if-no-files-found: error

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pEp-build-log
          path: artifacts/xcodebuild.log
          if-no-files-found: ignore
