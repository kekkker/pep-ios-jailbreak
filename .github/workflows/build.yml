name: Build TrollStore IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v6

      - name: Toolchain information
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks
          df -h .

      - name: Install build prerequisites
        run: |
          brew install autoconf automake libtool gnu-sed wget ninja xcodegen jq ldid dpkg
          python3 -m pip install --user --break-system-packages lxml

      - name: Install pEp-compatible asn1c
        run: |
          asn1c_prefix="$RUNNER_TEMP/asn1c-0.9.28"
          git clone --branch v0.9.28 --depth 1 https://github.com/vlm/asn1c.git "$RUNNER_TEMP/asn1c-source"
          cd "$RUNNER_TEMP/asn1c-source"
          autoreconf -iv
          ./configure --prefix="$asn1c_prefix"
          make -j "$(sysctl -n hw.ncpu)"
          make install
          echo "$asn1c_prefix/bin" >> "$GITHUB_PATH"

      - name: Install upstream-compatible Zig
        run: |
          zig_version=0.15.2
          case "$(uname -m)" in
            arm64) zig_arch=aarch64 ;;
            x86_64) zig_arch=x86_64 ;;
            *) echo "Unsupported runner architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          zig_archive="zig-${zig_arch}-macos-${zig_version}.tar.xz"
          zig_root="$PWD/zig-${zig_arch}-macos-${zig_version}"
          zig_url="https://ziglang.org/download/${zig_version}/${zig_archive}"
          expected=$(curl -fsSL https://ziglang.org/download/index.json | jq -r ".\"${zig_version}\".\"${zig_arch}-macos\".shasum")
          curl -fsSLO "$zig_url"
          echo "${expected}  ${zig_archive}" | shasum -a 256 -c -
          tar -xf "$zig_archive"
          echo "$zig_root" >> "$GITHUB_PATH"

      - name: Cache Rust build tools
        id: cargo-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-capi
            ~/.cargo/bin/cargo-cbuild
            ~/.cargo/bin/cargo-cinstall
            ~/.cargo/bin/cargo-ctest
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-c-${{ runner.os }}-${{ runner.arch }}-0.10.24

      - name: Install cargo-c
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-c

      - name: Save Rust build tools
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cargo/bin/cargo-capi
            ~/.cargo/bin/cargo-cbuild
            ~/.cargo/bin/cargo-cinstall
            ~/.cargo/bin/cargo-ctest
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-c-${{ runner.os }}-${{ runner.arch }}-0.10.24

      - name: Clone pinned upstream sources and apply compatibility patches
        run: scripts/bootstrap.sh

      - name: Restore pEp Rust build outputs
        id: pep-rust-cache
        uses: actions/cache/restore@v5
        with:
          path: work/pEpForiOS.XCFrameworks/pEpEngineSequoiaBackend/target
          key: pep-rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('work/pEpForiOS.XCFrameworks/pEpEngineSequoiaBackend/Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            pep-rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('work/pEpForiOS.XCFrameworks/pEpEngineSequoiaBackend/Cargo.lock') }}-

      - name: Restore completed native libraries
        id: pep-native-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            work/pEpForiOS.XCFrameworks/prefix
            work/pEpForiOS.XCFrameworks/Frameworks
          key: pep-native-ios-asn1c-0.9.28-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('work/pEpForiOS.XCFrameworks/.submodules.json') }}-${{ github.run_id }}
          restore-keys: |
            pep-native-ios-asn1c-0.9.28-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('work/pEpForiOS.XCFrameworks/.submodules.json') }}-

      - name: Build dependencies and application
        run: scripts/build.sh

      - name: Save pEp Rust build outputs
        if: always()
        uses: actions/cache/save@v5
        with:
          path: work/pEpForiOS.XCFrameworks/pEpEngineSequoiaBackend/target
          key: ${{ steps.pep-rust-cache.outputs.cache-primary-key }}

      - name: Save completed native libraries
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            work/pEpForiOS.XCFrameworks/prefix
            work/pEpForiOS.XCFrameworks/Frameworks
          key: ${{ steps.pep-native-cache.outputs.cache-primary-key }}

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: pEp-iOS16-trollstore
          path: build/artifacts/pEp-iOS16-trollstore.ipa
          if-no-files-found: error

      - name: Upload native notifier package
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: pep-native-background-engine
          path: build/artifacts/software.pep.notifier_*_iphoneos-arm64.deb
          if-no-files-found: error

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pEp-build-log
          path: build/artifacts/xcodebuild.log
          if-no-files-found: ignore
