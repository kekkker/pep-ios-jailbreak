name: Build standalone notifier

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "notifier/**"
      - ".github/workflows/notifier.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install packaging tools
        run: brew install ldid dpkg

      - name: Build iOS binaries
        run: |
          set -euo pipefail
          sdk=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build

          xcrun --sdk iphoneos clang \
            -fobjc-arc \
            -target arm64-apple-ios16.0 \
            -isysroot "$sdk" \
            -framework Foundation \
            -framework Security \
            -lsqlite3 \
            notifier/pep-notifier-launcher.m \
            -o build/pep-notifier-launcher

          xcrun --sdk iphoneos clang \
            -fobjc-arc \
            -dynamiclib \
            -target arm64-apple-ios16.0 \
            -isysroot "$sdk" \
            -framework Foundation \
            -Wl,-undefined,dynamic_lookup \
            -Wl,-install_name,/var/jb/Library/MobileSubstrate/DynamicLibraries/pep-notifier-bridge.dylib \
            notifier/pep-notifier-bridge.m \
            -o build/pep-notifier-bridge.dylib

          ldid -Snotifier/launcher.entitlements build/pep-notifier-launcher
          ldid -S build/pep-notifier-bridge.dylib

      - name: Package rootless Debian archive
        run: |
          set -euo pipefail
          package="$RUNNER_TEMP/package"
          mkdir -p \
            "$package/DEBIAN" \
            "$package/var/jb/usr/libexec" \
            "$package/var/jb/Library/LaunchDaemons" \
            "$package/var/jb/Library/MobileSubstrate/DynamicLibraries"

          cp notifier/control "$package/DEBIAN/control"
          cp build/pep-notifier-launcher "$package/var/jb/usr/libexec/"
          cp notifier/pep-notifier.py "$package/var/jb/usr/libexec/"
          cp notifier/software.pep.notifier.plist "$package/var/jb/Library/LaunchDaemons/"
          cp build/pep-notifier-bridge.dylib \
            "$package/var/jb/Library/MobileSubstrate/DynamicLibraries/"
          cp notifier/pep-notifier-bridge.plist \
            "$package/var/jb/Library/MobileSubstrate/DynamicLibraries/"

          chmod 755 \
            "$package/var/jb/usr/libexec/pep-notifier-launcher" \
            "$package/var/jb/usr/libexec/pep-notifier.py"
          chmod 644 \
            "$package/var/jb/Library/LaunchDaemons/software.pep.notifier.plist" \
            "$package/var/jb/Library/MobileSubstrate/DynamicLibraries/pep-notifier-bridge.dylib" \
            "$package/var/jb/Library/MobileSubstrate/DynamicLibraries/pep-notifier-bridge.plist"

          mkdir -p artifacts
          dpkg-deb --root-owner-group --build "$package" \
            artifacts/software.pep.notifier_0.1.0_iphoneos-arm64.deb

      - name: Upload notifier package
        uses: actions/upload-artifact@v6
        with:
          name: pep-standalone-notifier
          path: artifacts/software.pep.notifier_0.1.0_iphoneos-arm64.deb
          if-no-files-found: error
